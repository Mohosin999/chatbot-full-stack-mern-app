version: "3.8"

services:
  # ---------- MongoDB ----------
  mongo:
    image: mongo:latest
    container_name: cvcoach-mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${ROOT_PASSWORD}
      AUTH: admin
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - chatbot-network

  # ---------- MongoDB Express (Web UI) ----------
  mongo-express:
    image: mongo-express:latest
    container_name: cvcoach-mongo-express
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_SERVER: mongo
      ME_CONFIG_MONGODB_ADMINUSERNAME: ${ROOT_USERNAME}
      ME_CONFIG_MONGODB_ADMINPASSWORD: ${ROOT_PASSWORD}
      ME_CONFIG_BASICAUTH_USERNAME: admin
      ME_CONFIG_BASICAUTH_PASSWORD: admin123
    depends_on:
      - mongo
    networks:
      - chatbot-network

  # ---------- Backend ----------
  backend:
    build: ./backend
    container_name: cvcoach-backend
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - ./backend/.env
    environment:
      MONGODB_URI: ${MONGODB_URI}
    depends_on:
      - mongo
    networks:
      - chatbot-network

  # ---------- Frontend ----------
  frontend:
    build: ./frontend
    container_name: cvcoach-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    env_file:
      - ./frontend/.env
    depends_on:
      - backend
    networks:
      - chatbot-network

networks:
  chatbot-network:
    driver: bridge

volumes:
  mongo_data:
